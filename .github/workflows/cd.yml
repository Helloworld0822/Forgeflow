name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/

jobs:
  build-and-push:
    name: Build & push container images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            context: ./backend
            file: ./backend/Containerfile
            image: autoforge-api
          - name: nginx
            context: .
            file: ./nginx/Containerfile
            image: autoforge-nginx
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-compose-manifest:
    name: Publish compose manifest
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Generate production compose overlay
        run: |
          cat > compose.prod.yml <<'EOF'
          # AutoForge production overlay — generated by CD pipeline
          # Usage: IMAGE_PREFIX=ghcr.io/<owner>/ docker compose -f compose.yml -f compose.prod.yml up -d
          services:
            api:
              image: ${IMAGE_PREFIX}autoforge-api:latest
              pull_policy: always
            orchestrator:
              image: ${IMAGE_PREFIX}autoforge-api:latest
              pull_policy: always
            worker:
              image: ${IMAGE_PREFIX}autoforge-api:latest
              pull_policy: always
            nginx:
              image: ${IMAGE_PREFIX}autoforge-nginx:latest
              pull_policy: always
          EOF

      - name: Upload compose overlay artifact
        uses: actions/upload-artifact@v4
        with:
          name: compose-prod-overlay
          path: compose.prod.yml
          retention-days: 30

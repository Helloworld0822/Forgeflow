name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo build
        run: cargo build --release

      - name: cargo test
        run: cargo test --all-features

  frontend:
    name: Frontend (React/TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: lint
        run: npm run lint

      - name: build
        run: npm run build

  compose-smoke-test:
    name: Compose smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      HOST_HTTP_PORT: "8080"
      PUBLIC_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose -f compose.yml build

      - name: Start stack
        run: |
          docker compose -f compose.yml up -d
          sleep 8

      - name: Wait for API readiness
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8080/ready > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "waiting for API... ($i)"
            sleep 3
          done
          echo "API did not become ready in time"
          docker compose -f compose.yml logs
          exit 1

      - name: Smoke test endpoints
        run: |
          curl -sf http://localhost:8080/health | tee /dev/stderr | grep -q '"status"'
          curl -sf http://localhost:8080/ready | tee /dev/stderr | grep -q '"status"'
          curl -sf http://localhost:8080/v1/projects | tee /dev/stderr | grep -q '\[\]'
          curl -sf http://localhost:8080/v1/models | tee /dev/stderr | grep -q '"models"'

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f compose.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f compose.yml down -v

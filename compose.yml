# AutoForge — Docker / Podman Compose (통합)
# Docker:  docker compose up -d --build --scale worker=3  (포트 80: HOST_HTTP_PORT=80)
# Podman (rootless): podman compose up -d --build  또는 ./scripts/podman-up.sh

name: autoforge

x-app-env: &app-env
  MESSAGE_QUEUE_ENABLED: "true"
  REDIS_URL: redis://redis:6379
  ARTIFACTS_DIR: /data/artifacts
  MAX_IMAGE_BYTES: ${MAX_IMAGE_BYTES:-10485760}
  CURSOR_API_KEY: ${CURSOR_API_KEY:-}
  STITCH_API_KEY: ${STITCH_API_KEY:-}
  SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
  SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
  SLACK_CHANNEL: ${SLACK_CHANNEL:-}
  MAX_DEBUG_CYCLES: "3"
  WORKER_CONCURRENCY: "4"
  GITHUB_TOKEN: ${GITHUB_TOKEN:-}
  GITHUB_ORG: ${GITHUB_ORG:-}
  GITHUB_AUTO_MERGE: ${GITHUB_AUTO_MERGE:-true}
  PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
  API_KEY: ${API_KEY:-}
  LOGIN_USERNAME: ${LOGIN_USERNAME:-}
  LOGIN_PASSWORD: ${LOGIN_PASSWORD:-}
  SESSION_SECRET: ${SESSION_SECRET:-}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
  MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-52428800}

x-worker-limits: &worker-limits
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 512M

services:
  nginx:
    build:
      context: .
      dockerfile: nginx/Containerfile
    image: ${IMAGE_PREFIX:-}autoforge-nginx:latest
    ports:
      - "${HOST_HTTP_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  api:
    build:
      context: ./backend
      dockerfile: Containerfile
    image: ${IMAGE_PREFIX:-}autoforge-api:latest
    command: ["serve"]
    environment:
      <<: *app-env
      HOST: 0.0.0.0
      PORT: "8080"
    expose:
      - "8080"
    volumes:
      - artifacts-data:/data/artifacts
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  orchestrator:
    image: ${IMAGE_PREFIX:-}autoforge-api:latest
    command: ["orchestrate"]
    environment:
      <<: *app-env
      ORCHESTRATOR_ID: orchestrator-1
    volumes:
      - artifacts-data:/data/artifacts
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    <<: *worker-limits

  worker:
    image: ${IMAGE_PREFIX:-}autoforge-api:latest
    command: ["worker"]
    environment:
      <<: *app-env
    volumes:
      - artifacts-data:/data/artifacts
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    <<: *worker-limits

  redis:
    image: docker.io/library/redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  redis-data:
  artifacts-data:

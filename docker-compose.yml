# AutoForge — Docker / Podman Compose
# 사용: docker compose up -d --build
#       docker compose up -d --scale worker=3

version: "3.9"

x-app-env: &app-env
  MESSAGE_QUEUE_ENABLED: "true"
  REDIS_URL: redis://redis:6379
  ARTIFACTS_ENDPOINT: http://minio:9000
  ARTIFACTS_BUCKET: autoforge
  CURSOR_API_KEY: ${CURSOR_API_KEY:-}
  STITCH_API_KEY: ${STITCH_API_KEY:-}
  SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
  SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
  SLACK_CHANNEL: ${SLACK_CHANNEL:-}
  MAX_DEBUG_CYCLES: "3"
  WORKER_CONCURRENCY: "4"
  GITHUB_TOKEN: ${GITHUB_TOKEN:-}
  GITHUB_ORG: ${GITHUB_ORG:-}
  GITHUB_AUTO_MERGE: ${GITHUB_AUTO_MERGE:-true}
  PUBLIC_URL: ${PUBLIC_URL:-http://localhost}

services:
  # Nginx — 프론트엔드 정적 파일 + API 리버스 프록시
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: autoforge-nginx:latest
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  # Rust API 백엔드
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: autoforge-api:latest
    command: ["serve"]
    environment:
      <<: *app-env
      HOST: 0.0.0.0
      PORT: "8080"
    expose:
      - "8080"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  orchestrator:
    image: autoforge-api:latest
    command: ["orchestrate"]
    environment:
      <<: *app-env
      ORCHESTRATOR_ID: orchestrator-1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: autoforge-api:latest
    command: ["worker"]
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: docker.io/library/redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: docker.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  redis-data:
  minio-data:

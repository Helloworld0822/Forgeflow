events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # 기본 rate limit — API 남용 방지 (IP당 초당 5req, burst 20)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    upstream api {
        server api:8080;
    }

    # HTTPS를 사용하려면 아래 서버 블록의 주석을 해제하고 인증서를
    # nginx/certs/fullchain.pem, nginx/certs/privkey.pem 에 배치한 뒤
    # docker-compose.yml의 nginx 서비스에 volume과 443 포트를 추가하세요.
    # (Let's Encrypt/Certbot 또는 사내 CA 인증서 사용을 권장합니다.)
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #     # 아래 server { listen 80 } 블록과 동일한 location 설정을 사용하세요.
    # }
    #
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # API 헬스체크 / readiness
        location = /health {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /ready {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # REST API
        location /v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        # 이미지 호스팅 — 업로드된 이미지 직접 서빙 (공개, 캐시 가능)
        location /media/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_valid 200 7d;
        }

        # 프론트엔드 정적 에셋
        location /assets/ {
            try_files $uri =404;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}

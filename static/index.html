<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoForge — AI 외주 자동화</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2f3d;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #6c9eff;
      --success: #34d399;
      --warn: #fbbf24;
      --error: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 1.75rem; margin-bottom: 0.25rem; }
    .subtitle { color: var(--muted); margin-bottom: 2rem; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    label { display: block; font-size: 0.875rem; color: var(--muted); margin-bottom: 0.5rem; }
    input[type="text"], input[type="file"] {
      width: 100%;
      padding: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      margin-bottom: 1rem;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .pipeline {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
    }
    .stage {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      text-align: center;
      font-size: 0.8rem;
    }
    .stage .name { font-weight: 600; margin-bottom: 0.25rem; }
    .stage .status { color: var(--muted); text-transform: lowercase; }
    .stage.running { border-color: var(--accent); }
    .stage.completed { border-color: var(--success); }
    .stage.failed { border-color: var(--error); }
    .log {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-family: monospace;
      font-size: 0.8rem;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      color: var(--muted);
    }
    .models { font-size: 0.85rem; color: var(--muted); line-height: 1.8; }
    .models code { color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <h1>AutoForge</h1>
    <p class="subtitle">PDF 계획서 → Sonnet → Fable → Stitch → Codex 자동 파이프라인</p>

    <div class="card">
      <form id="upload-form">
        <label for="name">프로젝트 이름</label>
        <input type="text" id="name" name="name" placeholder="예: 쇼핑몰 리뉴얼" />

        <label for="repo_url">GitHub Repo URL (구현 단계용)</label>
        <input type="text" id="repo_url" name="repo_url" placeholder="https://github.com/org/repo" />

        <label for="plan">계획서 PDF</label>
        <input type="file" id="plan" name="plan" accept=".pdf" required />

        <button type="submit" id="submit-btn">파이프라인 시작</button>
      </form>
    </div>

    <div class="card models">
      <strong>모델 역할</strong><br />
      요약: <code>claude-4.6-sonnet-high-thinking</code><br />
      기획: <code>claude-fable-5-thinking-high</code><br />
      디자인: <code>Google Stitch</code><br />
      코딩: <code>gpt-5.3-codex-high</code>
    </div>

    <div class="card" id="status-card" style="display:none">
      <h3 style="margin-bottom:1rem">파이프라인 상태</h3>
      <div class="pipeline" id="pipeline"></div>
      <div class="log" id="log" style="margin-top:1rem"></div>
    </div>
  </div>

  <script>
    const STAGES = ["ingest","summarize","architect","design","implement","verify","deliver"];
    const STAGE_LABELS = {
      ingest: "PDF 수집", summarize: "Sonnet 요약", architect: "Fable 기획",
      design: "Stitch 디자인", implement: "Codex 구현", verify: "검증", deliver: "전달"
    };

    function renderStages(stages) {
      const el = document.getElementById("pipeline");
      el.innerHTML = STAGES.map(s => {
        const st = stages.find(x => x.stage === s);
        const status = st ? st.status : "queued";
        return `<div class="stage ${status}"><div class="name">${STAGE_LABELS[s]}</div><div class="status">${status}</div></div>`;
      }).join("");
    }

    function log(msg) {
      const el = document.getElementById("log");
      el.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
      el.scrollTop = el.scrollHeight;
    }

    async function pollStatus(projectId) {
      const res = await fetch(`/v1/projects/${projectId}`);
      const data = await res.json();
      renderStages(data.stages.map(s => ({ stage: s.stage, status: s.status })));
      log(`state: ${data.state}`);
      if (data.state === "completed" || data.state === "failed" || data.state === "cancelled") return;
      setTimeout(() => pollStatus(projectId), 3000);
    }

    document.getElementById("upload-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      btn.disabled = true;

      const form = new FormData();
      form.append("name", document.getElementById("name").value);
      form.append("repo_url", document.getElementById("repo_url").value);
      form.append("plan", document.getElementById("plan").files[0]);

      try {
        const res = await fetch("/v1/projects", { method: "POST", body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "upload failed");

        document.getElementById("status-card").style.display = "block";
        log(`프로젝트 생성: ${data.id}`);
        log(`스트림: ${data.stream_url}`);
        pollStatus(data.id);
      } catch (err) {
        log(`오류: ${err.message}`);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
